<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>Floatie</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="window-wrap">
        <div class="hover-ring" id="hover-ring"></div>
        <div class="menu-trigger" id="menu-trigger" title="Drag Window"></div>
        <div class="controls-overlay">
            <div class="title-bar">
                <span class="app-name" style="color: white;">Floatie</span>
                <div class="window-controls">
                    <button class="btn-ratio" title="Unlock Aspect Ratio">16:9</button>
                    <button class="btn-maximize" title="Maximize">{ }</button>
                    <button class="btn-close" title="Close">X</button>
                </div>
            </div>

            <div class="url-bar">
                <button id="back-btn" class="btn-nav" title="Back">&#8592;</button>
                <button id="forward-btn" class="btn-nav" title="Forward">&#8594;</button>
                <input type="text" id="url-input" class="url-input" placeholder="Paste any URL or YouTube Link..."
                    autocomplete="off" spellcheck="false" />
                <button id="go-btn" class="btn-go">Go</button>
            </div>
        </div>

        <div class="player-area">
            <webview id="yt-player" class="yt-player hidden" allowpopups disablewebsecurity="false"
                webpreferences="contextIsolation=yes">
            </webview>

            <div id="empty-state" class="empty-state">
                <p>Floatie is Floating..</p>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
