<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>Floatie</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="window-wrap">
        <div class="dot-cluster" id="dot-cluster">
            <div class="dot dot-close" id="dot-close" title="Close"></div>
            <div class="dot dot-maximize" id="dot-maximize" title="Maximize"></div>
        </div>
        <div class="hover-ring" id="hover-ring"></div>
        <div class="menu-trigger" id="menu-trigger" title="Drag Window"></div>
        <div class="controls-overlay">
            <div class="title-bar">
                <div class="tabs-list" id="tabs-list">
                    <!-- Tabs will be dynamically inserted here -->
                </div>
                <button class="add-tab-btn" id="add-tab-btn" title="New Tab">+</button>
                <div class="window-controls">
                    <button class="btn-ratio" title="Unlock Aspect Ratio">16:9</button>
                </div>
            </div>

            <div class="url-bar">
                <button id="back-btn" class="btn-nav" title="Back">&#8592;</button>
                <button id="reload-btn" class="btn-nav" title="Reload">&#8635;</button>
                <button id="forward-btn" class="btn-nav" title="Forward">&#8594;</button>
                <div class="bookmark-wrap">
                    <button id="bookmark-toggle" class="btn-bookmark" title="Bookmarks">⇓</button>
                    <div id="bookmark-dropdown" class="bookmark-dropdown hidden">
                        <div id="bookmark-list"></div>
                        <div id="bookmark-add-row" class="bookmark-add-row">
                            <button id="bookmark-add-btn" class="bookmark-plus">+</button>
                        </div>
                        <div id="bookmark-form" class="bookmark-form hidden">
                            <input type="text" id="bm-name" class="bm-input" placeholder="Name" autocomplete="off"
                                spellcheck="false" />
                            <input type="text" id="bm-url" class="bm-input" placeholder="URL" autocomplete="off"
                                spellcheck="false" />
                            <button id="bm-save" class="btn-bm-save">Save</button>
                        </div>
                    </div>
                </div>
                <input type="text" id="url-input" class="url-input" placeholder="Paste any URL or YouTube Link..."
                    autocomplete="off" spellcheck="false" />
                <button id="go-btn" class="btn-go">Go</button>
            </div>
        </div>

        <div class="player-area">
            <div id="webviews-container" class="webviews-container">
                <!-- Webviews will be dynamically inserted here -->
            </div>

            <div id="empty-state" class="empty-state">
                <p>Floatie is Floating..
                    Hover over the red dot to interact!
                </p>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
